<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot</title>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin-top: 0px;
      margin-bottom: 0px;
    }
    .send-button {
      background-color: rgb(25, 135, 84);
      color: white;
      padding: 12px 20px;
      margin-left: 20px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      
    }

    .chat-input {
      background-color: white;
      padding: 12px 15px;
      border-radius: 10px;
      border-width: 1px;
      font-size: 15px;
      flex-grow: 1;
    }

    .chat-input-container {
      display: flex;
      margin-bottom: 60px;
    }

    .app-container {
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .chat-message-user {
      display: flex;
      justify-content: right;
      align-items: start;
    }

     .chat-message-robot {
      display: flex;
      justify-content: left;
      align-items: start;
    }

    .chat-message-text{
      background-color: rgb(238, 238,238);
      padding: 15px 20px;
      border-radius: 10px;
      margin-right: 10px;
      margin-left: 10px;
      margin-bottom: 20px;
      max-width: 60%;
    }

    .chat-message-profile {
      width: 45px;
    }

    .chat-messages-container{
      flex-grow: 1;
      margin-top: 20px;
      overflow: scroll;
      scrollbar-width: none;
      
    }
  </style>
</head>

<body>
  <div class="js-container"></div>


  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

  <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

  <script src="https://unpkg.com/supersimpledev/babel.js"></script>

  <script type="text/babel">
    function ChatInput({ chatMessages, setChatMessages }) {
      const [inputText, setInputText] = React.useState('');

      function saveInputText(event) {
        setInputText(event.target.value);

      }

      function sendMessage() {
        //console.log(inputText);
        const newChatMessages = [
          ...chatMessages,   //2:10:06 in tutorial
          {
            message: inputText,
            sender: 'user',
            id: crypto.randomUUID()
          }
        ]
        setChatMessages(newChatMessages);

        //external library Chatbot
        const response = Chatbot.getResponse(inputText)
        setChatMessages([
          ...newChatMessages,   //2:10:06 in tutorial
          {
            message: response,
            sender: 'robot',
            id: crypto.randomUUID()
          }
        ]);

        setInputText('');
      }

      return (
        <div className="chat-input-container">
          <input
            className="chat-input"
            placeholder="Send message to chatbot"
            size="30"
            onChange={saveInputText}
            value={inputText}
          />
          <button
            className="send-button"
            onClick={sendMessage}
          >Send</button>
        </div>
      );
    }

    function ChatMessage({ message, sender }) {
      //console.log(props)
      //const message = props.message;
      //const sender = props.sender;
      // below is same as above or shortcut
      // const { message, sender} = props;

      /*
       if (sender === 'robot') {
         return (
           <div>
             <img src="robot.png" width="50" />
             {message}
           </div>
         );
       }
       */

      return (
        <div className={
          sender === 'user'
            ? 'chat-message-user'
            : 'chat-message-robot'
        }>
          {sender === 'robot' && (
            <img src="robot.png" className="chat-message-profile"  />
          )}
          <div className="chat-message-text">
            {message}
          </div>
          {sender === 'user' && (<img src="user.png" className="chat-message-profile" />
          )}
        </div>
      )

    }

    function ChatMessages({ chatMessages }) {
      
      const chatMessagesRef = React.useRef(null);

      React.useEffect(()=>{
        const containerElem = chatMessagesRef.current;
        if (containerElem) {
          containerElem.scrollTop = containerElem.scrollHeight;
        }

      }, [chatMessages]);

      return (
        <div 
        className="chat-messages-container"
        ref={chatMessagesRef}>
          {chatMessages.map((chatMessage) => {
            return (
              <ChatMessage
                message={chatMessage.message}
                sender={chatMessage.sender}
                key={chatMessage.id}
              />
            );
          })
          }
        </div>
      );
    }

    function App() {
      const [chatMessages, setChatMessages] = React.useState([{
        message: 'hello chatbot',
        sender: 'user',
        id: 'id1'
      }, {
        message: 'Hello! How can I help you?',
        sender: 'robot',
        id: 'id2'
      }, {
        message: 'Can you get me todays date?',
        sender: 'user',
        id: 'id3'
      }, {
        message: 'Today is Sep 27',
        sender: 'robot',
        id: 'id4'
      }]
      );

      //const [chatMessages, setChatMessages] = array;
      //        First Value, Second value
      // above is the shortcut of below two lines
      //const chatMessages = array[0];
      //const setChatMessages = array[1];

      return (
        <div className="app-container">
         
          <ChatMessages
            chatMessages={chatMessages}
            setChatMessages={setChatMessages}
          />
           <ChatInput
            chatMessages={chatMessages}
            setChatMessages={setChatMessages}
          />
        </div>
      );
    }


    const container = document.querySelector('.js-container');
    ReactDOM.createRoot(container).render(<App />);
  </script>
</body>

</html>
